name: Build APK → Firebase App Distribution

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de la versión para los testers'
        required: false
        default: 'Build automático desde rama main'

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Dependencias Java ────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ──────────────────────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: flutter-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # ── google-services.json (desde GitHub Secret) ───────────────────────────
      # En tu repo → Settings → Secrets → GOOGLE_SERVICES_JSON
      # Contenido: todo el JSON del archivo google-services.json de Firebase
      - name: Escribir google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/android/app/google-services.json

      # ── Build APK release ────────────────────────────────────────────────────
      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ vars.BACKEND_URL }}

      # ── Distribuir con Firebase App Distribution ─────────────────────────────
      # Secrets requeridos:
      #   FIREBASE_APP_ID          → Firebase console → App Distribution → App ID
      #                              formato: 1:123456789:android:abcdef123456
      #   CREDENTIAL_FILE_CONTENT  → JSON de la service account de Firebase
      #                              Firebase console → Project Settings → Service accounts
      #                              → Generate new private key
      - name: Distribuir a Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          releaseNotes: ${{ github.event.inputs.release_notes || format('Build {0} — {1}', github.run_number, github.sha) }}
          file: app/build/app/outputs/flutter-apk/app-release.apk
