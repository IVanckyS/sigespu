name: Deploy Flutter Web → Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: flutter-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            flutter-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Validar BACKEND_URL
        run: |
          if [ -z "${{ vars.BACKEND_URL }}" ]; then
            echo "ERROR: BACKEND_URL no está configurado."
            echo "Ve a tu repo → Settings → Variables → Actions → New repository variable"
            echo "Nombre: BACKEND_URL  Valor: https://TU-SERVICIO.up.railway.app"
            exit 1
          fi

      - name: Build Flutter Web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release \
            "--dart-define=API_BASE_URL=${{ vars.BACKEND_URL }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crear proyecto Cloudflare Pages si no existe
        continue-on-error: true
        run: npx wrangler pages project create sigespu-web --production-branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy app/build/web \
            --project-name=sigespu-web \
            --branch=main \
            --commit-hash=${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
