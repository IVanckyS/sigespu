name: Keep Railway Alive

on:
  schedule:
    # Ping cada 8 minutos para evitar que Railway duerma (duerme tras 10min inactivo)
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ vars.BACKEND_URL }}/api/health" || echo "000")
          echo "Health status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Railway no responde — posiblemente starting up. OK."
          fi
