name: sigespu
description: Sistema de Información Geoespacial de Seguridad Pública - Lota
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0
  flutter_map: ^7.0.0
  flutter_map_heatmap: ^0.0.8
  latlong2: ^0.9.0
  dio: ^5.4.0
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.0.0
  geolocator: ^14.0.0
  lucide_icons: ^0.257.0
  fl_chart: ^1.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.5.3
  shared:
    path: ../shared
  http: ^1.6.0
  file_picker: ^11.0.0
  screenshot: ^3.0.0
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.2
  google_fonts: ^8.0.0
  flutter_map_cancellable_tile_provider: ^3.0.0
  shared_preferences: ^2.5.5
  excel: ^4.0.6
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/amenazas/
    - assets/icon/
