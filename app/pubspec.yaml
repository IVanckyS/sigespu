name: sigespu
description: Sistema de Información Geoespacial de Seguridad Pública - Lota
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  flutter_map: ^6.1.0
  flutter_map_heatmap:
  latlong2: ^0.9.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  geolocator: ^11.0.0
  lucide_icons: ^0.257.0
  fl_chart: ^0.66.0
  pdf: ^3.11.0
  printing: ^5.13.0
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.5.3
  shared:
    path: ../shared
  http: ^1.6.0
  file_picker: ^8.0.0
  screenshot: ^3.0.0
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1
  flutter_map_cancellable_tile_provider: ^2.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/amenazas/
    - assets/icon/
