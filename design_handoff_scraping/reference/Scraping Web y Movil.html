<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIGESPU Lota · Scraping — Web & Móvil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: #EA580C !important;
    box-shadow: 0 0 0 3px #FFEDD5;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #A8A29E; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="mobile-chrome.jsx"></script>

<script type="text/babel" src="scraping-v2-data.jsx"></script>
<script type="text/babel" src="scraping-v2-web.jsx"></script>
<script type="text/babel" src="scraping-v2-mobile.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { ScrapingWebV1, ScrapingWebV2 } = window.ScrapingV2Web;
const { ScrapingMobileV1, ScrapingMobileV2 } = window.ScrapingV2Mobile;

const App = () => (
  <DesignCanvas>
    <DCSection
      id="scraping-web"
      title="Scraping · Vista Web"
      subtitle="2 enfoques de layout — misma información (500 patentes, Ley 20.285) adaptada al escritorio."
    >
      <DCArtboard id="web-v1" label="01 · Web · stack vertical (faithful)" width={1440} height={920} data-screen-label="Scraping Web V1">
        <ScrapingWebV1/>
      </DCArtboard>
      <DCArtboard id="web-v2" label="02 · Web · sidebar + KPIs + tabla" width={1440} height={920} data-screen-label="Scraping Web V2">
        <ScrapingWebV2/>
      </DCArtboard>
    </DCSection>

    <DCSection
      id="scraping-mobile"
      title="Scraping · Vista Móvil"
      subtitle="2 enfoques de layout — misma información en formato vertical · 402 × 874."
    >
      <DCArtboard id="mob-v1" label="03 · Móvil · hero + cards" width={402} height={874} data-screen-label="Scraping Mobile V1">
        <ScrapingMobileV1/>
      </DCArtboard>
      <DCArtboard id="mob-v2" label="04 · Móvil · KPI strip + lista densa" width={402} height={874} data-screen-label="Scraping Mobile V2">
        <ScrapingMobileV2/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
