<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SIGESPU · Versiones móvil</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#EA580C">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#EA580C"/>
    <g transform="translate(420 220)">
      <rect width="360" height="360" rx="64" fill="#1C1917"/>
      <path d="M60 290h240" stroke="#EA580C" stroke-width="22" stroke-linecap="round"/>
      <path d="M60 290c30-90 90-135 150-135s120 45 150 135" fill="#EA580C"/>
      <circle cx="245" cy="150" r="26" fill="#fff"/>
    </g>
    <text x="600" y="660" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="#fff" letter-spacing="-1">SIGESPU Lota</text>
    <text x="600" y="710" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="500" fill="#FED7AA">Versión móvil · I. Municipalidad de Lota</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens/common.jsx"></script>
<script type="text/babel" src="screens/resumen.jsx"></script>
<script type="text/babel" src="screens/tabla.jsx"></script>
<script type="text/babel" src="screens/scraping.jsx"></script>
<script type="text/babel" src="screens/usuarios.jsx"></script>
<script type="text/babel" src="screens/actividades.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const W = 402, H = 874;
  return (
    <DesignCanvas>
      <DCSection
        id="mobile"
        title="SIGESPU Lota · Versión móvil"
        subtitle="5 vistas adaptadas — mantienen toda la información y funciones del escritorio."
      >
        <DCArtboard id="resumen"     label="01 · Resumen"     width={W} height={H} data-screen-label="01 Resumen">
          <ScreenResumen/>
        </DCArtboard>
        <DCArtboard id="tabla"       label="02 · Tabla"       width={W} height={H} data-screen-label="02 Tabla">
          <ScreenTabla/>
        </DCArtboard>
        <DCArtboard id="scraping"    label="03 · Scraping"    width={W} height={H} data-screen-label="03 Scraping">
          <ScreenScraping/>
        </DCArtboard>
        <DCArtboard id="usuarios"    label="04 · Usuarios"    width={W} height={H} data-screen-label="04 Usuarios">
          <ScreenUsuarios/>
        </DCArtboard>
        <DCArtboard id="menu"        label="05 · Menú de cuenta" width={W} height={H} data-screen-label="05 Menu cuenta">
          <ScreenResumen/>
          <AvatarMenu activeItem="usuarios"/>
        </DCArtboard>
        <DCArtboard id="actividades" label="06 · Actividades" width={W} height={H} data-screen-label="06 Actividades">
          <ScreenActividades/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
