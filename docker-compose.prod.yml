version: '3.8'

# ── Producción ────────────────────────────────────────────────────────────────
# Uso:  docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# Ver deploy.sh para el flujo completo (SSL + healthchecks).

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-sigespu}
      POSTGRES_USER: ${DB_USER:-sigespu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sigespu_user} -d ${DB_NAME:-sigespu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sigespu}
      - DB_USER=${DB_USER:-sigespu_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-15}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-15}
      - JWT_REFRESH_EXPIRATION_DAYS=${JWT_REFRESH_EXPIRATION_DAYS:-7}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sigespu}
      - DB_USER=${DB_USER:-sigespu_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Template con ${DOMAIN} — el nginx oficial lo procesa con envsubst al arrancar
      - ./nginx/conf/prod.conf:/etc/nginx/templates/default.conf.template:ro
      # Certificados Let's Encrypt generados en el host con deploy.sh
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
      # Solo sustituir ${DOMAIN} — dejar $host, $remote_addr, etc. para nginx
      - NGINX_ENVSUBST_TEMPLATE_VARS=DOMAIN
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
